<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans - Pro Trading</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-cyan: #06b6d4;
            --primary-blue: #3b82f6;
            --bg-dark: #0b0f19;
            --card-bg: #111827;
            --border-color: #1f2937;
        }

        /* REMOVE SCROLLBARS */
        html, body {
            overflow-x: hidden;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg-dark);
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1e293b 0%, #0b0f19 100%);
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 0;
        }

        .pricing-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 50px 35px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .pricing-card:hover { border-color: #374151; transform: translateY(-5px); }

        .pricing-card.featured {
            border-color: var(--primary-cyan);
            background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(6, 182, 212, 0.15);
            z-index: 2;
        }

        .popular-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-cyan));
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .price-title { font-size: 1.1rem; font-weight: 600; color: #9ca3af; margin-bottom: 10px; text-transform: uppercase; }
        .price-value { font-size: 3.5rem; font-weight: 800; margin-bottom: 5px; color: #fff; }
        .price-value span { font-size: 1.1rem; color: #6b7280; font-weight: 400; }

        .feature-list { list-style: none; padding: 0; margin: 35px 0; text-align: left; flex-grow: 1; }
        .feature-list li { margin-bottom: 15px; display: flex; align-items: center; color: #d1d5db; }
        .feature-list li svg { color: var(--primary-cyan); margin-right: 15px; flex-shrink: 0; }

        .btn-plan {
            border-radius: 16px;
            padding: 16px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            border: none;
        }

        .btn-premium { 
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-cyan));
            color: white;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        .back-link { margin-top: 40px; color: #6b7280; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container text-center mb-5">
    <h1 class="fw-extrabold display-4 mb-3">Choose Your Edge</h1>
    <p class="text-secondary lead">Institutional-grade risk management for retail traders.</p>
</div>

<div class="pricing-grid">
    <div class="pricing-card">
        <div class="price-title">Starter</div>
        <div class="price-value">₹0<span>/mo</span></div>
        <ul class="feature-list">
            <li><svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg> 5 Trades Per Day</li>
        </ul>
        <a href="/" class="btn-plan" style="background: #1f2937; color: white;">Return to Home</a>
    </div>

    <div class="pricing-card featured">
        <div class="popular-badge">MOST POPULAR</div>
        <div class="price-title">Pro Yearly</div>
        <div class="price-value">₹5000<span>/yr</span></div>
        <ul class="feature-list">
            <li><svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg> Unlimited Daily Trades</li>
        </ul>
        <button id="rzp-button-yearly" class="btn-plan btn-premium">Activate Annual Pro</button>
    </div>

    <div class="pricing-card">
        <div class="price-title">Pro Monthly</div>
        <div class="price-value">₹499<span>/mo</span></div>
        <ul class="feature-list">
            <li><svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg> Full Automation Suite</li>
        </ul>
        <button id="rzp-button-monthly" class="btn-plan btn-premium">Get Monthly Pro</button>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
    async function handleSubscription(planType) {
        const btnId = planType === 'yearly' ? 'rzp-button-yearly' : 'rzp-button-monthly';
        const btn = document.getElementById(btnId);
        const originalText = btn.innerHTML;

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Connecting...';
        btn.disabled = true;

        try {
            // 1. Create Subscription on Server
            const response = await fetch('/create-subscription', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plan_type: planType })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error);

            // 2. Open Razorpay Modal
            const options = {
                key: "{{ key_id }}",
                subscription_id: data.subscription_id,
                name: "PRO TRADING",
                description: planType === 'yearly' ? "Annual Plan" : "Monthly Plan",
                handler: async function (response) {
                    // 3. Verify Payment with Backend (FIXES THE 404/ACCESS ISSUE)
                    const verifyRes = await fetch('/verify-subscription', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_subscription_id: response.razorpay_subscription_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    });
                    
                    const result = await verifyRes.json();
                    if (result.success) {
                        // 4. Redirect to dashboard only AFTER success verification
                        window.location.href = "/index";
                    } else {
                        alert("Verification failed: " + result.error);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                },
                prefill: { name: "{{ user.username }}", email: "{{ user.email }}" },
                theme: { color: "#06b6d4" },
                modal: {
                    ondismiss: function() {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();

        } catch (err) {
            alert("Error: " + err.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    document.getElementById('rzp-button-yearly').onclick = () => handleSubscription('yearly');
    document.getElementById('rzp-button-monthly').onclick = () => handleSubscription('monthly');
</script>
</body>
</html>
