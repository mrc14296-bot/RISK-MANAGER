# Nginx config for MindRiskControl - /etc/nginx/sites-available/mindriskcontrol
# Symlink: sudo ln -s /var/www/mindriskcontrol/nginx-mindriskcontrol.conf /etc/nginx/sites-available/
# sudo ln -s /etc/nginx/sites-available/mindriskcontrol /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream flask_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;  # Replace with your domain/IP: mindriskcontrol.com or VM external IP

    # Security headers
    add_header X-Frame-Options \"SAMEORIGIN\" always;
    add_header X-XSS-Protection \"1; mode=block\" always;
    add_header X-Content-Type-Options \"nosniff\" always;
    add_header Referrer-Policy \"no-referrer-when-downgrade\" always;
    add_header Content-Security-Policy \"default-src 'self' http: https: data: blob: 'unsafe-inline'\" always;

    # Static files (high perf)
    location /static/ {
        alias /var/www/mindriskcontrol/static/;
        expires 1y;
        add_header Cache-Control \"public, immutable\";
    }

    # Flask app proxy (502 fix)
    location / {
        try_files $uri @flask;
    }

    location @flask {
        include proxy_params;
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for Binance API/DB
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Health check
    location /debug-status {
        access_log off;
        proxy_pass http://flask_app/debug-status;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/mindriskcontrol/templates;
        internal;
    }
}
